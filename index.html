<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="theme-color" content="#0f172a" />
<title>Projects</title>
<style>
  :root {
    --bg: #0f172a;
    --card: #1e293b;
    --text: #e2e8f0;
    --muted: #94a3b8;
    --accent: #38bdf8;
    --border: #334155;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    min-height: 100vh;
    padding: 3rem 1rem;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  }
  main { width: min(760px, 100%); margin: 0 auto; }
  h1 { margin-bottom: 0.4rem; font-size: clamp(2rem, 7vw, 3.25rem); }
  .intro { color: var(--muted); line-height: 1.6; }
  .projects {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 1rem;
    margin-top: 2.5rem;
  }
  .project {
    display: flex;
    min-height: 180px;
    flex-direction: column;
    padding: 1.35rem;
    border: 1px solid var(--border);
    border-radius: 14px;
    background: var(--card);
    color: inherit;
    text-decoration: none;
    transition: border-color 0.15s, transform 0.15s;
  }
  .project:hover, .project:focus-visible {
    border-color: var(--accent);
    transform: translateY(-2px);
  }
  .project:focus-visible { outline: 2px solid var(--accent); outline-offset: 3px; }
  .project h2 { margin-bottom: 0.6rem; font-size: 1.25rem; }
  .project p { color: var(--muted); line-height: 1.5; }
  .project-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 1rem;
    margin-top: auto;
    padding-top: 1.25rem;
    color: var(--accent);
    font-size: 0.82rem;
    font-weight: 700;
  }
  .badge {
    padding: 0.2rem 0.55rem;
    border: 1px solid var(--border);
    border-radius: 999px;
    color: var(--muted);
    font-size: 0.7rem;
    letter-spacing: 0.03em;
    text-transform: uppercase;
  }
</style>
</head>
<body>
  <main>
    <h1>Projects</h1>
    <p class="intro">A small collection of browser-based tools and experiments.</p>

    <nav class="projects" aria-label="Projects">
      <a class="project" href="air-quality/">
        <h2>Air Quality Dashboard</h2>
        <p>Current conditions and forecasts for selected cities in Canada and Poland.</p>
        <div class="project-footer">
          <span>Open dashboard</span>
          <span aria-hidden="true">&rarr;</span>
        </div>
      </a>

      <a class="project" href="ocpp3/">
        <h2>OCPP3</h2>
        <p>A browser-based game currently in development.</p>
        <div class="project-footer">
          <span class="badge">Coming soon</span>
          <span aria-hidden="true">&rarr;</span>
        </div>
      </a>
    </nav>
  </main>
</body>
</html>
