<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="theme-color" content="#0f172a" />
<title>OCPP3 — Coming Soon</title>
<style>
  :root {
    --bg: #0f172a;
    --card: #1e293b;
    --text: #e2e8f0;
    --muted: #94a3b8;
    --accent: #38bdf8;
    --border: #334155;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    display: grid;
    min-height: 100vh;
    place-items: center;
    padding: 1rem;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  }
  main {
    width: min(560px, 100%);
    padding: clamp(1.5rem, 6vw, 3rem);
    border: 1px solid var(--border);
    border-radius: 16px;
    background: var(--card);
    text-align: center;
  }
  .eyebrow {
    margin-bottom: 0.8rem;
    color: var(--accent);
    font-size: 0.78rem;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  h1 { margin-bottom: 0.75rem; font-size: clamp(2.5rem, 12vw, 4.5rem); }
  p { color: var(--muted); line-height: 1.6; }
  a {
    display: inline-block;
    margin-top: 1.75rem;
    color: var(--accent);
    font-weight: 650;
    text-decoration: none;
  }
  a:hover, a:focus-visible { text-decoration: underline; }
</style>
</head>
<body>
  <main>
    <p class="eyebrow">Coming soon</p>
    <h1>OCPP3</h1>
    <p>This browser-based game is currently in development.</p>
    <a href="../">&larr; Back to all projects</a>
  </main>
</body>
</html>
